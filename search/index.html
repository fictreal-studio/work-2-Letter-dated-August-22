<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>記録検索端末｜よろずや公開記録照合</title>
    <meta
      name="description"
      content="ARG作品『八月二十二日の手紙』内で使用する架空の記録検索端末ページです。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header class="fiction-header" aria-label="フィクション表記">
      <p class="fiction-header__label">FICTIONAL SEARCH INTERFACE</p>
      <p class="fiction-header__text">このページは創作作品内の架空Webページです</p>
    </header>

    <main class="search-page" aria-labelledby="search-title">
      <section class="terminal-shell">
        <div class="terminal-topline">
          <div>
            <p class="system-label">YOROZUYA ARCHIVE SEARCH</p>
            <h1 id="search-title">記録検索端末</h1>
          </div>
          <button class="hint-button" type="button" aria-expanded="false" aria-controls="hint-panel">詰まったら？</button>
        </div>

        <aside class="hint-panel" id="hint-panel" hidden>
          上司からの指示書にあった言葉や、インタビュー記事に出てくる人物名・企業名を検索してみてください。
        </aside>

        <p class="lead">
          よろずや記録管理課の調査用端末です。上司からの指示書に記載された言葉を入力し、公開記録との照合を開始してください。
        </p>

        <form class="search-form" id="search-form" role="search">
          <label class="visually-hidden" for="search-input">調査したい言葉</label>
          <input
            id="search-input"
            name="q"
            type="search"
            autocomplete="off"
            placeholder="調査したい言葉を入力"
          />
          <button type="submit">検索</button>
        </form>

        <div class="terminal-meta" aria-label="検索条件">
          <span>照合日時：2060/04/07</span>
          <span>検索対象：公開記録</span>
        </div>

        <section class="results-area" aria-live="polite" aria-labelledby="results-title">
          <div class="results-heading">
            <h2 id="results-title">検索結果</h2>
            <p id="results-summary">検索語を入力すると、該当する公開記録がここに表示されます。</p>
          </div>
          <div class="results-list" id="results-list">
            <article class="empty-state">
              <p>未完了依頼に関係しそうな人物名、企業名、記事名を検索してください。</p>
            </article>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
